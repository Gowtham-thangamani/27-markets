# nginx reverse proxy for the API on the EC2 host.
#   sudo cp deploy/nginx/api.27markets.com.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
# Then get HTTPS:  sudo certbot --nginx -d api.27markets.com
# (certbot rewrites the listen 80 block to redirect to 443 automatically.)

server {
    listen 80;
    server_name api.27markets.com;

    # Allow KYC document uploads (multipart) up to 25 MB.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Preserve the real client so rate-limit keys + audit logs are accurate.
        # The app trusts one proxy hop (trust proxy = 1) — matches this setup.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for live quotes (ws).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
    }
}
