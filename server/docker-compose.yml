services:
  postgres:
    image: postgres:16-alpine
    container_name: apex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: apex
      POSTGRES_PASSWORD: apex_dev_password
      POSTGRES_DB: apex_markets
    ports:
      - '5432:5432'
    volumes:
      - apex_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U apex -d apex_markets']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  apex_pg_data:
