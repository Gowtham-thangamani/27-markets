<!doctype html>
<html lang="en" dir="ltr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="0PyPugjf_TO1vsoqi8OnaKUY9znbDR0hYbqWL15tzHA" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <meta
      name="description"
      content="27 Markets — Trade beyond limits. Premium CFD & forex brokerage with deep liquidity, tight spreads, and ultra-fast execution."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <title>27 Markets — Trade Beyond Limits</title>
    <script>
      // Dark-only brand theme. Clear any legacy 'light' preference so the site
      // never renders the retired light theme.
      try { document.documentElement.classList.remove('light'); localStorage.setItem('theme', 'dark'); } catch (e) {}
      // Apply saved language + direction before paint to avoid a flash / mis-mirror.
      try {
        var lang = localStorage.getItem('lang') === 'ar' ? 'ar' : 'en';
        document.documentElement.setAttribute('lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
