name: Nightly DB backup to S3

# Streams a compressed pg_dump of the production database off the EC2 host into an
# S3 bucket every night. Dormant until you provide the inputs below — the job is
# skipped while BACKUP_S3_BUCKET is unset, so merging this changes nothing.
#
# TO ENABLE (one-time):
#   1. Create a PRIVATE, versioned, encrypted S3 bucket (e.g. 27markets-db-backups)
#      with a lifecycle rule to expire objects after your retention window.
#   2. Repo → Settings → Secrets and variables → Actions:
#        - Variable  BACKUP_S3_BUCKET  = the bucket name
#        - Variable  EC2_HOST          = 51.20.251.133   (optional; falls back below)
#        - Secret    EC2_SSH_KEY       = contents of ~/.ssh/27markets-ec2 (private key)
#      AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY already exist (frontend deploy) and
#      must allow s3:PutObject on the bucket.
#   3. Verify with the "Run workflow" button (workflow_dispatch), then restore-test it.

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch:

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    # Stay dormant until the bucket is configured.
    if: ${{ vars.BACKUP_S3_BUCKET != '' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1
      - name: Write SSH key
        run: |
          install -m 600 /dev/null ec2_key
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ec2_key
      - name: Dump + upload
        env:
          EC2_HOST: ${{ vars.EC2_HOST || '51.20.251.133' }}
          BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y-%m-%d_%H%M%S)"
          KEY="db-backups/apex_markets/${STAMP}.sql.gz"
          echo "Streaming pg_dump from ${EC2_HOST} -> s3://${BUCKET}/${KEY}"
          ssh -i ec2_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 \
            ec2-user@"${EC2_HOST}" \
            "docker exec apex_postgres sh -c 'PGPASSWORD=\$POSTGRES_PASSWORD pg_dump -U apex -d apex_markets'" \
            | gzip -9 > "backup-${STAMP}.sql.gz"
          SIZE="$(du -h "backup-${STAMP}.sql.gz" | cut -f1)"
          echo "Dump size: ${SIZE}"
          test -s "backup-${STAMP}.sql.gz" # fail if the dump is empty
          aws s3 cp "backup-${STAMP}.sql.gz" "s3://${BUCKET}/${KEY}" --sse AES256
          echo "Uploaded ${KEY} (${SIZE})"
      - name: Clean up key
        if: always()
        run: rm -f ec2_key
