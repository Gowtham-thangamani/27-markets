name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time. Do NOT cancel in-progress runs: cancelling a Pages
# deployment mid-flight leaves it in a bad state and makes the next run fail
# with "Deployment failed, try again later" (GitHub's recommended setting).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (frontend → Render API)
        run: npm run build
        env:
          # Public API base (Render). Override via the repo variable
          # PUBLIC_API_URL if the deployed service URL differs.
          VITE_API_URL: ${{ vars.PUBLIC_API_URL || 'https://27markets-api.onrender.com/api' }}

      - name: SPA fallback (so deep links don't 404 on refresh)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
