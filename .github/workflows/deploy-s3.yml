name: Deploy frontend to S3 + CloudFront

# Publishes the React app to the production S3 bucket behind CloudFront
# (27markets.com). Runs automatically when this branch changes, and can be
# triggered by hand from the Actions tab.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID      — IAM user/role key with S3 + CloudFront permissions
#   AWS_SECRET_ACCESS_KEY  — its secret
# Bucket / distribution / region are non-secret (already in docs/DEPLOYMENT.md).

on:
  push:
    branches: [fix/deploy-s3-cloudfront]
  workflow_dispatch:

# One deploy at a time; never cancel an in-flight upload/invalidation.
concurrency:
  group: deploy-s3
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Build → S3 sync → CloudFront invalidation
        env:
          S3_BUCKET: 27markets-frontend
          CF_DISTRIBUTION_ID: E19DRXVNFKYHB4
          VITE_API_URL: https://api.27markets.com/api
        run: bash scripts/deploy-frontend.sh
