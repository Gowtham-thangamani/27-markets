name: Backend tests

# Runs the NestJS backend test suite (unit tests with mocked Prisma — no DB
# needed) on every PR and push that touches server/. Blocks merges on failure so
# ledger/finance regressions can't reach main.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/test-backend.yml'
  pull_request:
    paths:
      - 'server/**'
      - '.github/workflows/test-backend.yml'

concurrency:
  group: test-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests
        run: npm test -- --ci --runInBand
